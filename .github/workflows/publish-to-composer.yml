name: Publish to eTechFlow Composer repo

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MODULE_DIR: "."
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Build versioned dist zip
        id: build
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          cd "$MODULE_DIR"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' composer.json > "$tmp" && mv "$tmp" composer.json
          zip -r -q /tmp/module.zip . -x '.git/*' '.github/*'
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(sha1sum /tmp/module.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Publish to private Composer repo
        env:
          PORTAL_PUBLISH_TOKEN: ${{ secrets.PORTAL_PUBLISH_TOKEN }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          set -euo pipefail
          printf '%s' "$RELEASE_BODY" > /tmp/changelog.txt
          curl -fsS -X POST "https://license-service.etechflow.com/composer/publish" \
            -H "Authorization: Bearer $PORTAL_PUBLISH_TOKEN" \
            -F "composer_json=<$MODULE_DIR/composer.json" \
            -F "version=${{ steps.build.outputs.version }}" \
            -F "reference=${{ github.sha }}" \
            -F "shasum=${{ steps.build.outputs.sha }}" \
            -F "changelog=</tmp/changelog.txt" \
            -F "package=@/tmp/module.zip"
