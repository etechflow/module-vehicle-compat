name: Publish to eTechFlow Composer repo

# Bake the module into a versioned dist zip and push it to the private eTechFlow
# Composer repo (/composer/publish). Auto-publishes on ANY of:
#   * a published GitHub Release   (version = tag, changelog = release body)
#   * a pushed version tag  v*.*.* (version = tag, changelog = empty)  <- most reliable
#   * a manual run (workflow_dispatch) with a version + optional changelog
# MODULE_DIR is the path (relative to repo root) of the folder with composer.json.

on:
  release:
    types: [published]
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3)'
        required: true
      changelog:
        description: 'Release notes (optional)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MODULE_DIR: "."
    steps:
      - name: Resolve version + ref
        id: meta
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            release)
              V="${{ github.event.release.tag_name }}"; REF="${{ github.event.release.tag_name }}" ;;
            push)
              V="${{ github.ref_name }}"; REF="${{ github.ref_name }}" ;;
            *)
              V="${{ github.event.inputs.version }}"; REF="${{ github.ref_name }}" ;;
          esac
          V="${V#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Build versioned dist zip
        id: build
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          cd "$MODULE_DIR"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' composer.json > "$tmp" && mv "$tmp" composer.json
          zip -r -q /tmp/module.zip . -x '.git/*' '.github/*'
          echo "sha=$(sha1sum /tmp/module.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Publish to private Composer repo
        env:
          PORTAL_PUBLISH_TOKEN: ${{ secrets.PORTAL_PUBLISH_TOKEN }}
          RELEASE_BODY: ${{ github.event_name == 'release' && github.event.release.body || github.event.inputs.changelog }}
        run: |
          set -euo pipefail
          printf '%s' "$RELEASE_BODY" > /tmp/changelog.txt
          curl -fsS -X POST "https://license-service.etechflow.com/composer/publish" \
            -H "Authorization: Bearer $PORTAL_PUBLISH_TOKEN" \
            -F "composer_json=<$MODULE_DIR/composer.json" \
            -F "version=${{ steps.meta.outputs.version }}" \
            -F "reference=${{ github.sha }}" \
            -F "shasum=${{ steps.build.outputs.sha }}" \
            -F "changelog=</tmp/changelog.txt" \
            -F "package=@/tmp/module.zip"
          echo "Published ${{ steps.meta.outputs.version }} to the eTechFlow Composer repo."
