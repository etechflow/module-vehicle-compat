<div class="ks-vc-toolbar" style="display:flex;flex-wrap:wrap;align-items:center;gap:.5rem;margin:0 0 .75rem 0;padding:.65rem .75rem;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px">

    <input type="file" data-bind="event:{ change: onFileChange }" accept=".csv,text/csv"
           style="display:none" />

    <button type="button" data-bind="click: triggerFileInput"
            style="background:#0535F5;color:#fff;border:none;padding:.45rem .9rem;border-radius:5px;font-size:12.5px;font-weight:600;cursor:pointer">
        ⬆ Import CSV
    </button>

    <a href="#" data-bind="click: downloadSample"
       style="color:#0535F5;text-decoration:underline;font-size:12px">Download sample CSV</a>

    <span style="flex:1"></span>

    <button type="button" data-bind="click: deleteSelected, visible: selectedCount() > 0"
            style="background:#C41818;color:#fff;border:none;padding:.45rem .9rem;border-radius:5px;font-size:12.5px;font-weight:600;cursor:pointer">
        🗑 Delete <span data-bind="text: selectedCount()"></span> Selected
    </button>

    <button type="button" data-bind="click: selectAll, visible: rowsCount() > 0"
            style="background:transparent;border:1px solid #D1D5DB;color:#41362F;padding:.4rem .75rem;border-radius:5px;font-size:12px;cursor:pointer">
        <span data-bind="text: allSelected() ? 'Unselect all' : 'Select all'"></span>
    </button>

    <div data-bind="visible: status() !== '', text: status" style="flex-basis:100%;font-size:12px;color:#374151;padding:.25rem .15rem"></div>
</div>
